<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>编辑人物档案 - 南昌历史云志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>

<body class="bg-blue-100 min-h-screen flex">

    <!-- 侧边栏（和后台完全一致） -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
        <div class="p-6 border-b border-slate-400 flex items-center space-x-2">
            <span class="iconify text-red-600 text-2xl" data-icon="ri:dashboard-3-line"></span>
            <span class="font-bold tracking-wider">管理后台</span>
        </div>
        <nav class="flex-grow p-4 space-y-2 text-sm text-slate-400">
            <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2">核心看板</p>
            <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition"
                href="admin-dashboard.html">
                <span class="iconify" data-icon="ri:home-gear-line"></span>
                <span>主面板</span>
            </a>
            <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2 mt-6">内容维护</p>
            <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition"
                href="admin-history.html">
                <span class="iconify" data-icon="ri:book-read-line"></span>
                <span>历史事件管理</span>
            </a>
            <a class="flex items-center space-x-3 bg-red-600 text-white p-3 rounded-lg" href="admin-people.html">
                <span class="iconify" data-icon="ri:user-star-line"></span>
                <span>历史人物管理</span>
            </a>
            <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-users.html">
                <span class="iconify" data-icon="ri:team-line"></span>
                <span>系统用户管理</span>
            </a>
            <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2 mt-6">互动与设置</p>
            <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition"
                href="admin-messages.html">
                <span class="iconify" data-icon="ri:message-3-line"></span>
                <span>留言管理</span>
            </a>
            <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition"
                href="admin-questions.html">
                <span class="iconify" data-icon="ri:settings-4-line"></span>
                <span>题库管理</span>
            </a>
            <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition"
                href="admin-quiz-statistics.html">
                <span class="iconify" data-icon="ri:bar-chart-line"></span>
                <span>答题统计</span>
            </a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <a class="text-xs flex items-center space-x-2 text-slate-500 hover:text-white" href="index.html">
                <span class="iconify" data-icon="ri:logout-box-line"></span>
                <span>返回前台预览</span>
            </a>
        </div>
    </aside>

    <!-- 主内容区 -->
    <div class="flex-grow flex flex-col h-screen overflow-y-auto">
        <header class="bg-white h-16 border-b px-8 flex justify-between items-center shrink-0">
            <h2 class="font-bold text-gray-700">编辑人物档案</h2>
        </header>

        <main class="p-8">
            <div class="bg-white rounded-xl shadow-sm border p-6 max-w-4xl">
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-1 text-sm font-medium">姓名</label>
                            <input id="name" type="text" class="w-full border rounded-lg px-3 py-2">
                        </div>
                        <div>
                            <label class="block mb-1 text-sm font-medium">朝代</label>
                            <input id="dynasty" type="text" class="w-full border rounded-lg px-3 py-2">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-1 text-sm font-medium">生卒年</label>
                            <input id="birthDeath" type="text" class="w-full border rounded-lg px-3 py-2">
                        </div>
                        <div>
                            <label class="block mb-1 text-sm font-medium">封面图链接</label>
                            <input id="cover" type="text" class="w-full border rounded-lg px-3 py-2">
                        </div>
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-medium">主要贡献</label>
                        <textarea id="contribution" rows="3" class="w-full border rounded-lg px-3 py-2"></textarea>
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-medium">关联事件</label>
                        <input id="relatedEvent" type="text" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-medium">资料来源</label>
                        <input id="source" type="text" class="w-full border rounded-lg px-3 py-2">
                    </div>
                    <div>
                        <label class="block mb-1 text-sm font-medium">生平简介</label>
                        <textarea id="biography" rows="4" class="w-full border rounded-lg px-3 py-2"></textarea>
                    </div>
                    <button onclick="savePerson()" class="bg-red-600 text-white px-6 py-2 rounded-lg">
                        保存并提交
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentPersonId = null;

        window.onload = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            currentPersonId = urlParams.get('id');
            if (currentPersonId) {
                try {
                    const response = await fetch('/api/person/' + currentPersonId);
                    if (response.ok) {
                        const person = await response.json();
                        document.getElementById('name').value = person.name || '';
                        document.getElementById('dynasty').value = person.dynasty || '';
                        document.getElementById('birthDeath').value = person.birthDeath || '';
                        document.getElementById('cover').value = person.cover || '';
                        document.getElementById('contribution').value = person.contribution || '';
                        document.getElementById('relatedEvent').value = person.relatedEvent || '';
                        document.getElementById('source').value = person.source || '';
                        document.getElementById('biography').value = person.biography || '';
                    } else {
                        alert("获取人物详情失败");
                    }
                } catch (error) {
                    console.error("加载失败:", error);
                }
            }
        };

        async function savePerson() {
            const person = {
                name: document.getElementById('name').value,
                dynasty: document.getElementById('dynasty').value,
                birthDeath: document.getElementById('birthDeath').value,
                cover: document.getElementById('cover').value,
                contribution: document.getElementById('contribution').value,
                relatedEvent: document.getElementById('relatedEvent').value,
                source: document.getElementById('source').value,
                biography: document.getElementById('biography').value
            };

            if (currentPersonId) {
                person.personId = currentPersonId;
            }

            if (!person.name) {
                alert("姓名为必填项！");
                return;
            }

            try {
                let editorName = "系统管理员";
                try {
                    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                    if (currentUser && currentUser.username) {
                        editorName = currentUser.username;
                    }
                } catch(e) {}
                
                const response = await fetch('/api/person/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Editor-Name': editorName
                    },
                    body: JSON.stringify(person)
                });
                const result = await response.json();
                if (result.code === 1) {
                    alert('保存成功！');
                    location.href = 'admin-people.html';
                } else {
                    alert('保存失败：' + (result.msg || '未知错误'));
                }
            } catch (error) {
                console.error('Error:', error);
                alert('保存失败，请检查网络！');
            }
        }
    </script>
</body>

</html>
