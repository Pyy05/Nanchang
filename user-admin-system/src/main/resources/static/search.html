<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>全局搜索 - 南昌历史云志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
        .event-item { transition: transform 0.3s ease; }
        .event-item:hover { transform: translateY(-3px); }
    </style>
</head>

<body class="bg-[#FAF9F6]">
    <!-- 统一导航栏 -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16 relative">
            <div class="flex items-center space-x-2">
                <span class="iconify text-3xl red-accent" data-icon="ri:ancient-pavilion-fill"></span>
                <span class="text-xl font-bold text-gray-800">南昌历史云志</span>
            </div>
            <div class="hidden md:flex flex-1 justify-center space-x-8 text-gray-600 font-medium">
                <a class="hover:text-red-600" href="/index.html">首页</a>
                <a class="hover:text-red-600" href="/events.html">历史事件</a>
                <a class="hover:text-red-600" href="/special-81.html">八一专题</a>
                <a class="hover:text-red-600" href="/figures.html">历史人物</a>
                <a class="hover:text-red-600" href="/timeline.html">历史长河</a>
                <a class="hover:text-red-600" href="/faq.html">用户留言</a>
                <a class="hover:text-red-600" href="/quiz.html">互动问答</a>
                <a class="hover:text-red-600" href="/profile.html">我的</a>
            </div>
            <div class="flex items-center space-x-4">
                <a class="p-2 text-gray-500 hover:bg-gray-100 rounded-full" href="/search.html"><span class="iconify text-xl" data-icon="ri:search-line"></span></a>
                <a class="bg-red-accent text-white px-4 py-2 rounded-md text-sm hover:bg-red-700" href="/admin-login.html">后台管理</a>
            </div>
        </div>
    </nav>

    <!-- 搜索区域 -->
    <header class="text-center py-16">
        <h1 class="text-4xl font-black mb-6">探索南昌历史</h1>
        <div class="max-w-2xl mx-auto px-4 relative">
            <input id="searchInput" type="text" class="w-full px-6 py-4 rounded-full border-2 border-red-200 focus:border-red-600 focus:outline-none shadow-sm text-lg pr-16" placeholder="输入你想了解的历史人物或事件名称...">
            <button id="searchBtn" class="absolute right-6 top-1/2 transform -translate-y-1/2 p-2 bg-red-600 text-white rounded-full hover:bg-red-700 transition">
                <span class="iconify text-xl" data-icon="ri:search-line"></span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 space-y-16">
        <!-- 历史事件结果 -->
        <section>
            <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-red-600 pb-2 mb-6 inline-block">相关历史事件</h2>
            <div id="events-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 动态加载 -->
                <div class="text-gray-500">请输入关键词进行搜索...</div>
            </div>
        </section>

        <!-- 历史人物结果 -->
        <section>
            <h2 class="text-2xl font-bold text-gray-800 border-b-2 border-red-600 pb-2 mb-6 inline-block">相关历史人物</h2>
            <div id="figures-container" class="grid grid-cols-2 md:grid-cols-4 gap-x-6 gap-y-12">
                <!-- 动态加载 -->
                <div class="col-span-full text-gray-500">请输入关键词进行搜索...</div>
            </div>
        </section>
    </main>

    <!-- 底部 -->
    <footer class="bg-neutral-900 text-neutral-500 py-12 px-6 mt-20">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-xs">
            <p>© 2026 南昌历史云志 · 软件工程班</p>
        </div>
    </footer>

    <script>
        $(document).ready(function () {
            // 用于缓存全部数据
            let allEvents = [];
            let allPersons = [];

            // 获取数据
            function fetchAllData() {
                $.ajax({
                    url: '/api/event/list',
                    type: 'GET',
                    success: function (data) {
                        allEvents = data || [];
                        performSearch(); // 初始执行一次搜索判断URL参数
                    }
                });

                $.ajax({
                    url: '/api/person/list',
                    type: 'GET',
                    success: function (data) {
                        allPersons = data || [];
                        performSearch(); // 初始执行一次搜索判断URL参数
                    }
                });
            }

            // 执行搜索与渲染
            function performSearch() {
                let query = $('#searchInput').val().trim();
                
                // 如果搜索框为空，尝试从URL参数中获取q
                if (!query) {
                    const urlParams = new URLSearchParams(window.location.search);
                    query = urlParams.get('q') || '';
                    if(query) {
                        $('#searchInput').val(query);
                    }
                }

                if (!query) {
                    return; // 为空不渲染或者清空
                }

                // 1. 过滤并渲染事件
                let filteredEvents = allEvents.filter(e => (e.eventName && e.eventName.includes(query)));
                renderEvents(filteredEvents);

                // 2. 过滤并渲染人物
                let filteredPersons = allPersons.filter(p => (p.name && p.name.includes(query)));
                renderPersons(filteredPersons);
            }

            // 图片映射（事件）
            const eventImageMap = {
                "灌婴筑城": "https://www.helloimg.com/i/2026/05/31/6a1c1b80ce8eb.jpg",
                "许逊治水": "https://www.helloimg.com/i/2026/05/31/6a1c1b8bed169.jpg",
                "滕王阁始建": "https://www.helloimg.com/i/2026/05/31/6a1c1b8833c71.jpg",
                "南唐迁都南昌": "https://www.helloimg.com/i/2026/05/31/6a1c36b6f3378.png",
                "洪都之战": "https://www.helloimg.com/i/2026/05/31/6a1c1b80e6390.jpg",
                "王守仁平叛": "https://www.helloimg.com/i/2026/05/31/6a1c1b88bf6c4.jpg",
                "刘显抗倭": "https://www.helloimg.com/i/2026/05/31/6a1c1b80e483a.jpg",
                "八大山人出家": "https://www.helloimg.com/i/2026/05/31/6a1c1b8089982.jpg",
                "程矞采禁烟": "https://www.helloimg.com/i/2026/05/31/6a1c36d805403.png",
                "孙中山南昌阅兵": "https://www.helloimg.com/i/2026/05/31/6a1c368e9b95b.png",
                "袁玉冰创办《新江西》": "https://www.helloimg.com/i/2026/05/31/6a1c1b890abbf.jpg",
                "扬子洲农民协会成立": "https://www.helloimg.com/i/2026/05/31/6a1c1b8d9901b.jpg",
                "八一南昌起义": "https://www.helloimg.com/i/2026/05/31/6a1c1b80defc8.jpg",
                "新四军军部进驻南昌": "https://www.helloimg.com/i/2026/05/31/6a1c1b89e7c39.jpg",
                "南昌会战": "https://www.helloimg.com/i/2026/05/31/6a1c1b81314c0.jpg",
                "新中国第一架飞机首飞成功": "https://www.helloimg.com/i/2026/05/31/6a1c1b8a31763.jpg",
                "南昌市被列为国家历史文化名城": "https://www.helloimg.com/i/2026/05/31/6a1c1b8604d65.jpg",
                "滕王阁景区获评国家5A级景区": "https://www.helloimg.com/i/2026/05/31/6a1c1b87be9fb.jpg"
            };

            function renderEvents(list) {
                let html = '';
                if (list.length > 0) {
                    list.forEach(e => {
                        const imgUrl = eventImageMap[e.eventName] || "https://via.placeholder.com/200x120?text=暂无图片";
                        const content = e.process ? e.process.substring(0, 80) + '...' : '暂无简介';
                        html += `
                            <div class="event-item bg-white rounded-xl shadow-md p-4 flex gap-4">
                                <img src="${imgUrl}" class="w-32 h-24 object-cover rounded-lg flex-shrink-0">
                                <div class="flex-1">
                                    <h3 class="text-lg font-bold text-gray-800 mb-1">${e.eventName}</h3>
                                    <p class="text-xs text-gray-500 mb-2">${e.dynasty}</p>
                                    <p class="text-sm text-gray-700 mb-2 line-clamp-2">${content}</p>
                                    <a href="event-detail.html?id=${e.eventId}" class="text-red-600 text-sm hover:underline font-bold">查看详情</a>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    html = '<div class="col-span-full text-gray-500">未找到相关事件</div>';
                }
                $('#events-container').html(html);
            }

            function renderPersons(list) {
                let html = '';
                if (list.length > 0) {
                    list.forEach(person => {
                        let cover = person.cover || 'https://via.placeholder.com/400x400?text=暂无图片';
                        let title = person.relatedEvent || person.birthDeath || '';
                        html += `
                        <div class="group figure-card" style="display: block;">
                            <div class="aspect-square bg-gray-200 rounded-2xl overflow-hidden mb-4 relative shadow-md group-hover:shadow-red-200 group-hover:shadow-2xl transition duration-500">
                                <img alt="${person.name}" class="w-full h-full object-cover" src="${cover}"/>
                                <div class="absolute inset-0 bg-red-900/40 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                                    <a class="bg-white text-red-600 px-6 py-2 rounded-full font-bold text-sm transform translate-y-4 group-hover:translate-y-0 transition duration-300" href="figure-detail.html?id=${person.personId}">查看生平</a>
                                </div>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800">${person.name}</h3>
                            <p class="text-red-700 text-xs font-bold mb-2">${title}</p>
                        </div>
                        `;
                    });
                } else {
                    html = '<div class="col-span-full text-gray-500">未找到相关人物</div>';
                }
                $('#figures-container').html(html);
            }

            // 绑定事件
            $('#searchInput').keypress(function (e) {
                if (e.key === 'Enter') {
                    // 更新 URL 参数以支持书签和刷新
                    const newUrl = new URL(window.location);
                    newUrl.searchParams.set('q', $(this).val().trim());
                    window.history.pushState({}, '', newUrl);
                    
                    performSearch();
                }
            });
            $('#searchBtn').click(function () {
                const newUrl = new URL(window.location);
                newUrl.searchParams.set('q', $('#searchInput').val().trim());
                window.history.pushState({}, '', newUrl);

                performSearch();
            });

            // 页面启动时加载数据
            fetchAllData();
        });
    </script>
</body>
</html>
