<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>新增历史事件 - 南昌历史云志</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>
<body class="bg-blue-100 min-h-screen flex">

<!-- 侧边栏（和后台完全一致） -->
<aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
    <div class="p-6 border-b border-slate-400 flex items-center space-x-2">
        <span class="iconify text-red-600 text-2xl" data-icon="ri:dashboard-3-line"></span>
        <span class="font-bold tracking-wider">管理后台</span>
    </div>
    <nav class="flex-grow p-4 space-y-2 text-sm text-slate-400">
        <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2">核心看板</p>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-dashboard.html">
            <span class="iconify" data-icon="ri:home-gear-line"></span>
            <span>主面板</span>
        </a>
        <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2 mt-6">内容维护</p>
        <a class="flex items-center space-x-3 bg-red-600 text-white p-3 rounded-lg" href="admin-history.html">
            <span class="iconify" data-icon="ri:book-read-line"></span>
            <span>历史事件管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-people.html">
            <span class="iconify" data-icon="ri:user-star-line"></span>
            <span>历史人物管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-users.html">
            <span class="iconify" data-icon="ri:team-line"></span>
            <span>系统用户管理</span>
        </a>
    </nav>
    <div class="p-6 border-t border-slate-800">
        <a class="text-xs flex items-center space-x-2 text-slate-500 hover:text-white" href="index.html">
            <span class="iconify" data-icon="ri:logout-box-line"></span>
            <span>返回前台预览</span>
        </a>
    </div>
</aside>

<!-- 主内容区 -->
<div class="flex-grow flex flex-col h-screen overflow-y-auto">
    <header class="bg-white h-16 border-b px-8 flex justify-between items-center shrink-0">
        <h2 class="font-bold text-gray-700">新增历史事件</h2>
    </header>

    <main class="p-8">
        <div class="bg-white rounded-xl shadow-sm border p-6 max-w-4xl">
            <div class="space-y-5">
                <div>
                    <label class="block mb-1 text-sm font-medium">事件名称</label>
                    <input id="title" type="text" class="w-full border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block mb-1 text-sm font-medium">发生时间</label>
                    <input id="time" type="text" class="w-full border rounded-lg px-3 py-2">
                </div>
                <div>
                    <label class="block mb-1 text-sm font-medium">事件简介</label>
                    <textarea id="desc" rows="4" class="w-full border rounded-lg px-3 py-2"></textarea>
                </div>
                <button onclick="saveEvent()" class="bg-red-600 text-white px-6 py-2 rounded-lg">
                    保存并提交
                </button>
            </div>
        </div>
    </main>
</div>

<script>
// 保存事件 + 计数 + 跳转
function saveEvent() {
    // 事件总数 +1
    let current = parseInt(localStorage.getItem("eventNum") || 128);
    localStorage.setItem("eventNum", current + 1);

    // 跳回列表页
    location.href = "admin-history.html";
}
</script>
</body>
</html>
