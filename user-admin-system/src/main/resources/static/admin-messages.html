<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>留言管理 - 南昌历史云志</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
</head>
<body class="bg-blue-100 min-h-screen flex">

<!-- 侧边栏 -->
<aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
    <div class="p-6 border-b border-slate-400 flex items-center space-x-2">
        <span class="iconify text-red-600 text-2xl" data-icon="ri:dashboard-3-line"></span>
        <span class="font-bold tracking-wider">管理后台</span>
    </div>
    <nav class="flex-grow p-4 space-y-2 text-sm text-slate-400">
        <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2">核心看板</p>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-dashboard.html">
            <span class="iconify" data-icon="ri:home-gear-line"></span>
            <span>主面板</span>
        </a>
        <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2 mt-6">内容维护</p>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-history.html">
            <span class="iconify" data-icon="ri:book-read-line"></span>
            <span>历史事件管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-people.html">
            <span class="iconify" data-icon="ri:user-star-line"></span>
            <span>历史人物管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-users.html">
            <span class="iconify" data-icon="ri:team-line"></span>
            <span>系统用户管理</span>
        </a>
        <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2 mt-6">互动与设置</p>
        <a class="flex items-center space-x-3 bg-red-600 text-white p-3 rounded-lg" href="admin-messages.html">
            <span class="iconify" data-icon="ri:message-3-line"></span>
            <span>留言管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-questions.html">
            <span class="iconify" data-icon="ri:settings-4-line"></span>
            <span>题库管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-quiz-statistics.html">
            <span class="iconify" data-icon="ri:bar-chart-line"></span>
            <span>答题统计</span>
            </a>
    </nav>
    <div class="p-6 border-t border-slate-800">
        <a class="text-xs flex items-center space-x-2 text-slate-500 hover:text-white" href="index.html">
            <span class="iconify" data-icon="ri:logout-box-line"></span>
            <span>返回前台预览</span>
        </a>
    </div>
</aside>

<!-- 主内容区 -->
<div class="flex-grow flex flex-col h-screen overflow-y-auto">
    <!-- 顶部条 -->
    <header class="bg-white h-16 border-b px-8 flex justify-between items-center shrink-0">
        <h2 class="font-bold text-gray-700">留言管理</h2>
        <div class="flex items-center space-x-6 text-gray-500">
            <div class="relative">
                <span class="iconify text-xl" data-icon="ri:notification-3-line"></span>
                <span class="absolute -top-1 -right-1 bg-red-600 w-2 h-2 rounded-full border border-white"></span>
            </div>
            <div class="flex items-center space-x-3">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-bold text-gray-800" id="adminName">管理员</p>
                    <p class="text-[10px]">超级管理员</p>
                </div>
                <img class="w-8 h-8 rounded-full border" src="https://i.cetsteam.com/imgs/2026/03/22/78bdfedcbd73c77d.png"/>
            </div>
        </div>
    </header>

    <main class="p-8">
        <!-- 统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4">
                <div class="bg-blue-50 text-blue-600 p-4 rounded-lg">
                    <span class="iconify text-2xl" data-icon="ri:message-3-line"></span>
                </div>
                <div>
                    <p class="text-xs text-gray-500">留言总数</p>
                    <p id="totalCount" class="text-2xl font-black text-gray-800">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4">
                <div class="bg-yellow-50 text-yellow-600 p-4 rounded-lg">
                    <span class="iconify text-2xl" data-icon="ri:time-line"></span>
                </div>
                <div>
                    <p class="text-xs text-gray-500">待回复</p>
                    <p id="pendingCount" class="text-2xl font-black text-gray-800">0</p>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center space-x-4">
                <div class="bg-green-50 text-green-600 p-4 rounded-lg">
                    <span class="iconify text-2xl" data-icon="ri:check-line"></span>
                </div>
                <div>
                    <p class="text-xs text-gray-500">已回复</p>
                    <p id="repliedCount" class="text-2xl font-black text-gray-800">0</p>
                </div>
            </div>
        </div>

        <!-- 筛选和操作区 -->
        <div class="bg-white rounded-xl shadow-sm border p-6 mb-6">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center space-x-3">
                    <button onclick="filterMessages(null)" id="btn-all" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition">
                        全部留言
                    </button>
                    <button onclick="filterMessages(0)" id="btn-pending" class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:border-red-600 hover:text-red-600 transition">
                        待回复
                    </button>
                    <button onclick="filterMessages(1)" id="btn-replied" class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:border-red-600 hover:text-red-600 transition">
                        已回复
                    </button>
                </div>
                
            </div>
        </div>

        <!-- 留言列表 -->
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div id="messageList" class="divide-y">
                <!-- 留言项将通过 JavaScript 动态加载 -->
            </div>
            
            <!-- 分页 -->
            <div class="px-6 py-4 border-t flex justify-between items-center">
                <p class="text-sm text-gray-500" id="pageInfo">共 0 条记录</p>
                <div class="flex items-center space-x-2">
                    <button onclick="changePage(-1)" id="prevBtn" 
                            class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                        上一页
                    </button>
                    <span id="currentPageDisplay" class="text-sm text-gray-600">第 1 页</span>
                    <button onclick="changePage(1)" id="nextBtn" 
                            class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                        下一页
                    </button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- 回复模态框 -->
<div id="replyModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
        <div class="p-6 border-b flex justify-between items-center">
            <h3 class="text-xl font-bold text-gray-800">回复留言</h3>
            <button onclick="closeReplyModal()" class="text-gray-400 hover:text-gray-600">
                <span class="iconify text-2xl" data-icon="ri:close-line"></span>
            </button>
        </div>
        <div class="p-6">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">用户提问</label>
                <div class="bg-gray-50 p-4 rounded-lg text-gray-700" id="originalQuestion"></div>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">管理员回复 <span class="text-red-500">*</span></label>
                <textarea id="replyContent" rows="6" 
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-transparent"
                          placeholder="请输入回复内容..."></textarea>
            </div>
        </div>
        <div class="p-6 border-t flex justify-end space-x-3">
            <button onclick="closeReplyModal()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
                取消
            </button>
            <button onclick="submitReply()" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium">
                提交回复
            </button>
        </div>
    </div>
</div>

<!-- 删除确认模态框 -->
<div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4">
        <div class="p-6">
            <div class="flex items-center space-x-3 mb-4">
                <span class="iconify text-3xl text-red-600" data-icon="ri:error-warning-fill"></span>
                <h3 class="text-xl font-bold text-gray-800">确认删除</h3>
            </div>
            <p class="text-gray-600 mb-6">确定要删除这条留言吗？此操作不可恢复。</p>
            <div class="flex justify-end space-x-3">
                <button onclick="closeDeleteModal()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
                    取消
                </button>
                <button onclick="confirmDelete()" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium">
                    确认删除
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let currentPage = 0;
let currentStatus = null;
let totalPages = 1;
const pageSize = 10;
let currentMessageId = null;
let currentUser = null;

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', () => {
    checkLoginStatus();
    loadMessages();
    loadStatistics();
});

// 检查登录状态
function checkLoginStatus() {
    const userStr = localStorage.getItem('currentUser');
    if (userStr) {
        try {
            currentUser = JSON.parse(userStr);
            if (currentUser.username) {
                document.getElementById('adminName').textContent = currentUser.username;
            }
        } catch (e) {
            console.error('解析用户信息失败', e);
            alert('请先登录');
            window.location.href = 'admin-login.html';
        }
    } else {
        alert('请先登录');
        window.location.href = 'admin-login.html';
    }
}

// 加载统计数据
async function loadStatistics() {
    try {
        const response = await fetch('/api/message/list?page=0&size=1');
        const result = await response.json();
        
        if (result.code === 1) {
            document.getElementById('totalCount').textContent = result.data.total || 0;
        }
        
        // 获取待回复数量
        const pendingResponse = await fetch('/api/message/list?status=0&page=0&size=1');
        const pendingResult = await pendingResponse.json();
        if (pendingResult.code === 1) {
            document.getElementById('pendingCount').textContent = pendingResult.data.total || 0;
        }
        
        // 获取已回复数量
        const repliedResponse = await fetch('/api/message/list?status=1&page=0&size=1');
        const repliedResult = await repliedResponse.json();
        if (repliedResult.code === 1) {
            document.getElementById('repliedCount').textContent = repliedResult.data.total || 0;
        }
    } catch (error) {
        console.error('加载统计数据失败:', error);
    }
}

// 加载留言列表
async function loadMessages() {
    try {
        const statusParam = currentStatus !== null ? `&status=${currentStatus}` : '';
        const url = `/api/message/list?page=${currentPage}&size=${pageSize}${statusParam}`;
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.code === 1) {
            renderMessages(result.data.list);
            totalPages = result.data.pages || 1;
            updatePagination(result.data.total);
        } else {
            console.error('加载失败：', result.msg);
            document.getElementById('messageList').innerHTML = 
                '<div class="p-12 text-center text-gray-500">加载失败，请刷新重试</div>';
        }
    } catch (error) {
        console.error('Error:', error);
        document.getElementById('messageList').innerHTML = 
            '<div class="p-12 text-center text-gray-500">网络错误，请检查连接</div>';
    }
}

// 渲染留言列表
function renderMessages(messages) {
    const container = document.getElementById('messageList');
    
    if (!messages || messages.length === 0) {
        container.innerHTML = `
            <div class="p-12 text-center text-gray-500">
                <span class="iconify text-6xl mb-4 inline-block" data-icon="ri:inbox-line"></span>
                <p>暂无留言数据</p>
            </div>
        `;
        return;
    }
    
    container.innerHTML = messages.map(msg => {
        const isReplied = msg.status === 1;
        const statusBadge = isReplied 
            ? `<span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                 <span class="iconify mr-1" data-icon="ri:check-line"></span>已回复
               </span>`
            : `<span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">
                 <span class="iconify mr-1" data-icon="ri:time-line"></span>待回复
               </span>`;
        
        const replySection = isReplied && msg.reply ? `
            <div class="mt-3 pl-4 border-l-2 border-green-300 bg-green-50 p-3 rounded-lg">
                <div class="flex items-center mb-2">
                    <span class="iconify text-green-600 mr-2" data-icon="ri:admin-line"></span>
                    <span class="text-sm font-medium text-green-700">管理员回复</span>
                </div>
                <p class="text-gray-700 text-sm leading-relaxed">${escapeHtml(msg.reply)}</p>
            </div>
        ` : '';
        
        const userInfo = msg.userId ? `
            <div class="flex items-center text-xs text-gray-500 mt-2">
                <span class="iconify mr-1" data-icon="ri:user-line"></span>
                用户ID: ${msg.userId}
            </div>
        ` : '';
        
        return `
            <div class="p-6 hover:bg-gray-50 transition">
                <div class="flex items-start justify-between mb-3">
                    <div class="flex-1">
                        <div class="flex items-center space-x-3 mb-2">
                            ${statusBadge}
                            <span class="text-xs text-gray-400">${formatDateTime(msg.createTime)}</span>
                        </div>
                        <p class="text-gray-800 font-medium">${escapeHtml(msg.content)}</p>
                        ${userInfo}
                    </div>
                    <div class="flex items-center space-x-2 ml-4">
                        ${!isReplied ? `
                            <button onclick="openReplyModal(${msg.messageId}, '${escapeHtml(msg.content)}')" 
                                    class="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-xs font-medium hover:bg-blue-700 transition">
                                <span class="iconify inline-block mr-1" data-icon="ri:reply-line"></span>回复
                            </button>
                        ` : `
                            <button onclick="openReplyModal(${msg.messageId}, '${escapeHtml(msg.content)}', '${escapeHtml(msg.reply || '')}')" 
                                    class="px-3 py-1.5 bg-gray-200 text-gray-700 rounded-lg text-xs font-medium hover:bg-gray-300 transition">
                                <span class="iconify inline-block mr-1" data-icon="ri:edit-line"></span>编辑
                            </button>
                        `}
                        <button onclick="openDeleteModal(${msg.messageId})" 
                                class="px-3 py-1.5 bg-red-100 text-red-600 rounded-lg text-xs font-medium hover:bg-red-200 transition">
                            <span class="iconify inline-block mr-1" data-icon="ri:delete-bin-line"></span>删除
                        </button>
                    </div>
                </div>
                ${replySection}
            </div>
        `;
    }).join('');
}

// 打开回复模态框
function openReplyModal(messageId, question, existingReply = '') {
    currentMessageId = messageId;
    document.getElementById('originalQuestion').textContent = question;
    document.getElementById('replyContent').value = existingReply;
    document.getElementById('replyModal').classList.remove('hidden');
    document.getElementById('replyModal').classList.add('flex');
}

// 关闭回复模态框
function closeReplyModal() {
    document.getElementById('replyModal').classList.add('hidden');
    document.getElementById('replyModal').classList.remove('flex');
    currentMessageId = null;
    document.getElementById('replyContent').value = '';
}

// 提交回复
async function submitReply() {
    const replyContent = document.getElementById('replyContent').value.trim();
    
    if (!replyContent) {
        alert('请输入回复内容');
        return;
    }
    
    try {
        const response = await fetch(`/api/message/reply/${currentMessageId}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                replyContent: replyContent
            })
        });
        
        const result = await response.json();
        
        if (result.code === 1) {
            alert('回复成功！');
            closeReplyModal();
            loadMessages();
            loadStatistics();
        } else {
            alert('回复失败：' + (result.msg || '未知错误'));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('网络错误，请稍后重试');
    }
}

// 打开删除确认模态框
function openDeleteModal(messageId) {
    currentMessageId = messageId;
    document.getElementById('deleteModal').classList.remove('hidden');
    document.getElementById('deleteModal').classList.add('flex');
}

// 关闭删除确认模态框
function closeDeleteModal() {
    document.getElementById('deleteModal').classList.add('hidden');
    document.getElementById('deleteModal').classList.remove('flex');
    currentMessageId = null;
}

// 确认删除
async function confirmDelete() {
    if (!currentMessageId) return;
    
    try {
        const response = await fetch(`/api/message/delete/${currentMessageId}`, {
            method: 'DELETE'
        });
        
        const result = await response.json();
        
        if (result.code === 1) {
            alert('删除成功！');
            closeDeleteModal();
            loadMessages();
            loadStatistics();
        } else {
            alert('删除失败：' + (result.msg || '未知错误'));
        }
    } catch (error) {
        console.error('Error:', error);
        alert('网络错误，请稍后重试');
    }
}

// 筛选留言
function filterMessages(status) {
    currentStatus = status;
    currentPage = 0;
    updateFilterButtons();
    loadMessages();
}

// 更新筛选按钮样式
function updateFilterButtons() {
    document.getElementById('btn-all').className = currentStatus === null 
        ? 'px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition'
        : 'px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:border-red-600 hover:text-red-600 transition';
    
    document.getElementById('btn-pending').className = currentStatus === 0
        ? 'px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition'
        : 'px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:border-red-600 hover:text-red-600 transition';
    
    document.getElementById('btn-replied').className = currentStatus === 1
        ? 'px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition'
        : 'px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:border-red-600 hover:text-red-600 transition';
}

// 刷新留言
function refreshMessages() {
    loadMessages();
    loadStatistics();
}

// 处理搜索
function handleSearch(event) {
    if (event.key === 'Enter') {
        const keyword = document.getElementById('searchInput').value.trim();
        if (keyword) {
            alert('搜索功能开发中，关键词：' + keyword);
        }
    }
}

// 翻页
function changePage(delta) {
    const newPage = currentPage + delta;
    if (newPage >= 0 && newPage < totalPages) {
        currentPage = newPage;
        loadMessages();
    }
}

// 更新分页信息
function updatePagination(total) {
    document.getElementById('pageInfo').textContent = `共 ${total} 条记录`;
    document.getElementById('currentPageDisplay').textContent = `第 ${currentPage + 1} / ${totalPages} 页`;
    document.getElementById('prevBtn').disabled = currentPage === 0;
    document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
}

// 格式化时间
function formatDateTime(dateTimeStr) {
    if (!dateTimeStr) return '';
    const date = new Date(dateTimeStr);
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    return `${year}-${month}-${day} ${hours}:${minutes}`;
}

// HTML 转义防止 XSS
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
