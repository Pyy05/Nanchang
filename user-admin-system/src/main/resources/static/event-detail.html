<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>南昌历史云志 - 事件详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
    </style>
</head>
<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <div class="flex items-center space-x-2">
                <span class="iconify text-3xl red-accent" data-icon="ri:ancient-pavilion-fill"></span>
                <span class="text-xl font-bold tracking-wider text-gray-800">南昌历史云志</span>
            </div>
            <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
                <a class="hover:text-red-600" href="index.html">首页</a>
                <a class="hover:text-red-600" href="events.html">历史事件</a>
                <a class="hover:text-red-600" href="special-81.html">八一专题</a>
                <a class="hover:text-red-600" href="figures.html">历史人物</a>
                <a class="hover:text-red-600" href="timeline.html">历史长河</a>
                <a class="hover:text-red-600" href="faq.html">互动问答</a>
                <a class="hover:text-red-600" href="about.html">关于我们</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div id="detailContainer">
            <div class="text-center py-12">加载中...</div>
        </div>
    </div>

    <footer class="bg-gray-900 text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2026 南昌历史云志 · 历史事件归档计划</p>
        </div>
    </footer>

    <script>
        $(document).ready(function () {
            // 和 events.html 完全一致的图片映射表
            const imageMap = {
                "灌婴筑城": "https://www.helloimg.com/i/2026/05/31/6a1c1b80ce8eb.jpg",
                "许逊治水": "https://www.helloimg.com/i/2026/05/31/6a1c1b8bed169.jpg",
                "滕王阁始建": "https://www.helloimg.com/i/2026/05/31/6a1c1b8833c71.jpg",
                "南唐迁都南昌": "https://www.helloimg.com/i/2026/05/31/6a1c36b6f3378.png",
                "洪都之战": "https://www.helloimg.com/i/2026/05/31/6a1c1b80e6390.jpg",
                "王守仁平叛": "https://www.helloimg.com/i/2026/05/31/6a1c1b88bf6c4.jpg",
                "刘显抗倭": "https://www.helloimg.com/i/2026/05/31/6a1c1b80e483a.jpg",
                "八大山人出家": "https://www.helloimg.com/i/2026/05/31/6a1c1b8089982.jpg",
                "程矞采禁烟": "https://www.helloimg.com/i/2026/05/31/6a1c36d805403.png",
                "孙中山南昌阅兵": "https://www.helloimg.com/i/2026/05/31/6a1c368e9b95b.png",
                "袁玉冰创办《新江西》": "https://www.helloimg.com/i/2026/05/31/6a1c1b890abbf.jpg",
                "扬子洲农民协会成立": "https://www.helloimg.com/i/2026/05/31/6a1c1b8d9901b.jpg",
                "八一南昌起义": "https://www.helloimg.com/i/2026/05/31/6a1c1b80defc8.jpg",
                "新四军军部进驻南昌": "https://www.helloimg.com/i/2026/05/31/6a1c1b89e7c39.jpg",
                "南昌会战": "https://www.helloimg.com/i/2026/05/31/6a1c1b81314c0.jpg",
                "新中国第一架飞机首飞成功": "https://www.helloimg.com/i/2026/05/31/6a1c1b8a31763.jpg",
                "南昌市被列为国家历史文化名城": "https://www.helloimg.com/i/2026/05/31/6a1c1b8604d65.jpg",
                "滕王阁景区获评国家5A级景区": "https://www.helloimg.com/i/2026/05/31/6a1c1b87be9fb.jpg"
            };

            // 获取URL里的事件ID
            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('id');

            if (!eventId) {
                $('#detailContainer').html('<div class="text-center py-12 text-red-500">无效的事件ID</div>');
                return;
            }

            // 请求详情接口
            $.ajax({
                url: "/api/event/" + eventId,
                type: "GET",
                success: function (e) {
                    // 关键：用 imageMap 匹配图片链接
                    const imgUrl = imageMap[e.eventName] || "https://via.placeholder.com/400x200?text=暂无图片";
                    
                    const html = `
                        <div class="bg-white rounded-xl shadow-md p-8">
                            <h1 class="text-3xl font-bold text-center red-accent mb-4">${e.eventName}</h1>
                            <div class="flex justify-center mb-6">
                                <img src="${imgUrl}" 
                                     alt="${e.eventName}" 
                                     class="w-full max-w-lg h-auto rounded-lg shadow">
                            </div>
                            <div class="grid grid-cols-2 gap-4 mb-6 text-gray-700">
                                <p><strong>时间：</strong>${e.occurTime}</p>
                                <p><strong>朝代：</strong>${e.dynasty}</p>
                                <p><strong>地点：</strong>${e.location || '南昌'}</p>
                                <p><strong>来源：</strong>${e.source || '无'}</p>
                            </div>
                            <div class="prose max-w-none text-gray-700">
                                <h3 class="text-xl font-bold mb-2">事件过程</h3>
                                <p class="mb-4">${e.process}</p>
                                <h3 class="text-xl font-bold mb-2">历史意义</h3>
                                <p>${e.significance}</p>
                            </div>
                            <div class="mt-8 text-center">
                                <a href="events.html" class="inline-block bg-gray-200 px-6 py-2 rounded hover:bg-gray-300 transition">返回列表</a>
                            </div>
                        </div>
                    `;
                    $('#detailContainer').html(html);
                },
                error: function () {
                    $('#detailContainer').html(`
                        <div class="text-center py-12">
                            <p class="text-red-500 mb-4">详情接口加载失败</p>
                            <a href="events.html" class="inline-block bg-gray-200 px-6 py-2 rounded hover:bg-gray-300 transition">返回列表</a>
                        </div>
                    `);
                }
            });
        });
    </script>
</body>
</html>
