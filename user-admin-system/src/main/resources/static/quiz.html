<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动答题 - 南昌历史云志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
        .option-btn:hover {
            transform: translateX(5px);
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">
<!-- 导航 -->
<nav class="bg-white shadow-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
<div class="flex items-center space-x-2">
<span class="iconify text-3xl red-accent" data-icon="ri:ancient-pavilion-fill"></span>
<span class="text-xl font-bold text-gray-800">南昌历史云志</span>
</div>
<div class="hidden md:flex space-x-8 text-gray-600 font-medium">
<a class="hover:text-red-600" href="/index.html">首页</a>
<a class="hover:text-red-600" href="/events.html">历史事件</a>
<a class="hover:text-red-600" href="/special-81.html">八一专题</a>
<a class="hover:text-red-600" href="/figures.html">历史人物</a>
<a class="hover:text-red-600" href="/timeline.html">历史长河</a>
<a class="hover:text-red-600" href="/faq.html">用户留言</a>
<a class="red-accent border-b-2 border-red-600" href="quiz.html">互动答题</a>
<a class="hover:text-red-600" href="game.html">互动游戏</a>
<a class="hover:text-red-600" href="/about.html">关于我们</a>
<a class="hover:text-red-600" href="/profile.html">我的</a>
</div>
<div class="flex items-center space-x-4">
    
        <div class="flex items-center space-x-4">
            <a class="p-2 text-gray-500 hover:bg-gray-100 rounded-full" href="/search.html"><span class="iconify text-xl" data-icon="ri:search-line"></span></a>
            <a class="bg-red-accent text-white px-4 py-2 rounded-md text-sm hover:bg-red-700" href="/admin-login.html">后台管理</a>
            </div>
            </div>
            </nav>
            
                <header class="bg-gradient-to-r from-red-700 to-red-900 text-white py-12 px-4">
                    <div class="max-w-3xl mx-auto text-center">
                        <h1 class="text-3xl font-bold mb-3">南昌历史知识挑战</h1>
                        <p class="text-red-200 text-sm opacity-80">测试你对英雄城历史的了解程度</p>
                        <a href="leaderboard.html" class="inline-flex items-center mt-4 px-6 py-2 bg-white/20 backdrop-blur-sm rounded-full text-white hover:bg-white/30 transition">
                            <span class="iconify mr-2" data-icon="ri:trophy-line"></span>
                            查看积分排行榜
                        </a>
                    </div>
                </header>
            

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="loginTip" class="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-yellow-800 hidden">
            <span class="iconify inline-block mr-1" data-icon="ri:error-warning-line"></span>
            请先 <a href="admin-login.html" class="text-red-600 font-medium hover:underline">登录</a> 后才能参与答题并获得积分
        </div>

        <div id="categorySection" class="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <span class="iconify text-red-600 mr-2" data-icon="ri:list-check-2"></span>
                选择题库类型
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="startQuiz('random')" class="p-4 border-2 border-gray-200 rounded-xl hover:border-red-500 hover:bg-red-50 transition text-left">
                    <div class="flex items-center space-x-3">
                        <span class="iconify text-2xl text-red-600" data-icon="ri:shuffle-line"></span>
                        <div>
                            <h3 class="font-bold text-gray-800">随机抽题</h3>
                            <p class="text-xs text-gray-500 mt-1">从全部题库中随机抽取</p>
                        </div>
                    </div>
                </button>
                <button onclick="startQuiz('event')" class="p-4 border-2 border-gray-200 rounded-xl hover:border-red-500 hover:bg-red-50 transition text-left">
                    <div class="flex items-center space-x-3">
                        <span class="iconify text-2xl text-blue-600" data-icon="ri:book-mark-line"></span>
                        <div>
                            <h3 class="font-bold text-gray-800">历史事件</h3>
                            <p class="text-xs text-gray-500 mt-1">专注于历史事件题目</p>
                        </div>
                    </div>
                </button>
                <button onclick="startQuiz('person')" class="p-4 border-2 border-gray-200 rounded-xl hover:border-red-500 hover:bg-red-50 transition text-left">
                    <div class="flex items-center space-x-3">
                        <span class="iconify text-2xl text-green-600" data-icon="ri:user-star-line"></span>
                        <div>
                            <h3 class="font-bold text-gray-800">历史人物</h3>
                            <p class="text-xs text-gray-500 mt-1">专注于历史人物题目</p>
                        </div>
                    </div>
                </button>
                <button onclick="showCustomSelector()" class="p-4 border-2 border-gray-200 rounded-xl hover:border-red-500 hover:bg-red-50 transition text-left">
                    <div class="flex items-center space-x-3">
                        <span class="iconify text-2xl text-purple-600" data-icon="ri:settings-3-line"></span>
                        <div>
                            <h3 class="font-bold text-gray-800">自定义选择</h3>
                            <p class="text-xs text-gray-500 mt-1">选择特定事件或人物</p>
                        </div>
                    </div>
                </button>
            </div>
        </div>

        <div id="customSelector" class="hidden bg-white rounded-2xl shadow-lg p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-800 mb-4">自定义选题</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择类型</label>
                    <select id="customType" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                        <option value="event">历史事件</option>
                        <option value="person">历史人物</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">选择具体项目（或留空随机）</label>
                    <select id="customContentSelect" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500">
                        <option value="">-- 随机抽取 --</option>
                    </select>
                </div>
                <button onclick="startCustomQuiz()" class="w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition font-medium">
                    开始答题
                </button>
            </div>
        </div>

        <div id="quizSection" class="hidden">
            <div class="bg-white rounded-2xl shadow-lg p-6 mb-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-sm text-gray-500">进度：<span id="currentNum">1</span> / <span id="totalNum">10</span></span>
                    <span class="text-sm font-bold text-red-600">当前得分：<span id="currentScore">0</span></span>
                </div>
                
                <div id="questionContainer" class="fade-in">
                    <h3 id="questionText" class="text-lg font-bold text-gray-800 mb-6 leading-relaxed"></h3>
                    
                    <div id="optionsContainer" class="space-y-3">
                    </div>
                </div>

                <div id="resultContainer" class="hidden mt-6 p-4 rounded-lg">
                    <div id="resultMessage" class="font-bold mb-2"></div>
                    <div id="resultAnalysis" class="text-sm text-gray-700"></div>
                    <button onclick="nextQuestion()" class="mt-4 w-full bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition font-medium">
                        下一题
                    </button>
                </div>
            </div>
        </div>

        <div id="summarySection" class="hidden bg-white rounded-2xl shadow-lg p-6">
            <div class="text-center">
                <span class="iconify text-6xl text-yellow-500 mb-4 inline-block" data-icon="ri:trophy-line"></span>
                <h2 class="text-2xl font-bold text-gray-800 mb-2">答题完成！</h2>
                <p class="text-gray-600 mb-6">你的总得分：<span id="finalScore" class="text-3xl font-black text-red-600">0</span></p>
                <div class="flex justify-center space-x-4">
                    <button onclick="location.reload()" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                        再来一次
                    </button>
                    <a href="leaderboard.html" class="px-6 py-2 bg-white border-2 border-red-600 text-red-600 rounded-lg hover:bg-red-50 transition">
                        查看排行
                    </a>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentUser = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let quizType = '';

        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            loadContentOptions();
        });

        function checkLoginStatus() {
            const userStr = localStorage.getItem('currentUser');
            if (userStr) {
                try {
                    currentUser = JSON.parse(userStr);
                    document.getElementById('loginLink').classList.add('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userInfo').textContent = currentUser.username || '用户';
                    document.getElementById('userPoints').classList.remove('hidden');
                    document.getElementById('userPoints').textContent = `积分: ${currentUser.points || 0}`;
                    document.getElementById('loginTip').classList.add('hidden');
                } catch (e) {
                    console.error('解析用户信息失败', e);
                }
            }
        }

        async function startQuiz(type) {
            if (!currentUser) {
                alert('请先登录后再参与答题');
                window.location.href = 'admin-login.html';
                return;
            }

            quizType = type;
            let url = '';
            
            switch(type) {
                case 'random':
                    url = '/api/question/random?count=10';
                    break;
                case 'event':
                    url = '/api/question/random/event?count=10';
                    break;
                case 'person':
                    url = '/api/question/random/person?count=10';
                    break;
            }

            try {
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.code === 1) {
                    questions = result.data;
                    if (questions.length === 0) {
                        alert('该分类下暂无题目');
                        return;
                    }
                    showQuizSection();
                    displayQuestion();
                } else {
                    alert('获取题目失败：' + result.msg);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('网络错误，请稍后重试');
            }
        }

        async function loadContentOptions() {
            const type = document.getElementById('customType').value;
            const selectElement = document.getElementById('customContentSelect');
            
            selectElement.innerHTML = '<option value="">-- 随机抽取 --</option>';
            selectElement.disabled = true;
            
            try {
                const url = type === 'event' ? '/api/event/simple-list' : '/api/person/simple-list';
                const response = await fetch(url);
                const data = await response.json();
                
                if (data && data.length > 0) {
                    data.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.id;
                        option.textContent = `[${item.dynasty || '未知'}] ${item.name}`;
                        selectElement.appendChild(option);
                    });
                }
                
                selectElement.disabled = false;
            } catch (error) {
                console.error('加载选项失败:', error);
                selectElement.innerHTML = '<option value="">-- 加载失败 --</option>';
                selectElement.disabled = false;
            }
        }

        function showCustomSelector() {
            document.getElementById('customSelector').classList.remove('hidden');
            loadContentOptions();
        }

        async function startCustomQuiz() {
            if (!currentUser) {
                alert('请先登录后再参与答题');
                window.location.href = 'admin-login.html';
                return;
            }

            const type = document.getElementById('customType').value;
            const contentId = document.getElementById('customContentSelect').value;
            
            let url = '';
            if (contentId) {
                url = `/api/question/random/${type}/${contentId}?count=10`;
            } else {
                url = `/api/question/random/${type}?count=10`;
            }

            try {
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.code === 1) {
                    questions = result.data;
                    if (questions.length === 0) {
                        alert('该分类下暂无题目');
                        return;
                    }
                    showQuizSection();
                    displayQuestion();
                } else {
                    alert('获取题目失败：' + result.msg);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('网络错误，请稍后重试');
            }
        }


        function showQuizSection() {
            document.getElementById('categorySection').classList.add('hidden');
            document.getElementById('customSelector').classList.add('hidden');
            document.getElementById('quizSection').classList.remove('hidden');
            document.getElementById('totalNum').textContent = questions.length;
        }

        function displayQuestion() {
            const question = questions[currentQuestionIndex];
            document.getElementById('currentNum').textContent = currentQuestionIndex + 1;
            document.getElementById('questionText').textContent = question.content;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const options = [
                { key: 'A', value: question.optionA },
                { key: 'B', value: question.optionB },
                { key: 'C', value: question.optionC },
                { key: 'D', value: question.optionD }
            ];

            options.forEach(opt => {
                if (opt.value) {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full text-left p-4 border-2 border-gray-200 rounded-lg hover:border-red-500 hover:bg-red-50 transition';
                    btn.innerHTML = `<span class="font-bold text-red-600 mr-2">${opt.key}.</span>${opt.value}`;
                    btn.onclick = () => submitAnswer(opt.key);
                    optionsContainer.appendChild(btn);
                }
            });

            document.getElementById('resultContainer').classList.add('hidden');
        }

        async function submitAnswer(userAnswer) {
            const question = questions[currentQuestionIndex];
            
            try {
                const response = await fetch('/api/question/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.userId,
                        questionId: question.questionId,
                        answer: userAnswer
                    })
                });

                const result = await response.json();
                
                if (result.code === 1) {
                    const answerResult = result.data;
                    showResult(answerResult);
                    
                    if (answerResult.correct) {
                        score += answerResult.score;
                        document.getElementById('currentScore').textContent = score;
                        
                        if (currentUser) {
                            currentUser.points = (currentUser.points || 0) + answerResult.pointsAdded;
                            localStorage.setItem('currentUser', JSON.stringify(currentUser));
                            document.getElementById('userPoints').textContent = `积分: ${currentUser.points}`;
                        }
                    }
                } else {
                    alert('提交答案失败：' + result.msg);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('网络错误，请稍后重试');
            }
        }

        function showResult(result) {
            const resultContainer = document.getElementById('resultContainer');
            const resultMessage = document.getElementById('resultMessage');
            const resultAnalysis = document.getElementById('resultAnalysis');
            
            resultContainer.classList.remove('hidden');
            
            if (result.correct) {
                resultContainer.className = 'mt-6 p-4 rounded-lg bg-green-50 border border-green-200';
                resultMessage.className = 'font-bold mb-2 text-green-700';
                resultMessage.innerHTML = `<span class="iconify inline-block mr-1" data-icon="ri:check-line"></span>${result.praise}`;
            } else {
                resultContainer.className = 'mt-6 p-4 rounded-lg bg-blue-50 border border-blue-200';
                resultMessage.className = 'font-bold mb-2 text-blue-700';
                resultMessage.innerHTML = `<span class="iconify inline-block mr-1" data-icon="ri:close-line"></span>${result.encouragement}`;
            }
            
            resultAnalysis.innerHTML = `
                <div class="mt-2"><span class="font-medium">正确答案：</span>${result.answer}</div>
                ${result.analysis ? `<div class="mt-2"><span class="font-medium">解析：</span>${result.analysis}</div>` : ''}
            `;

            const optionsContainer = document.getElementById('optionsContainer');
            const buttons = optionsContainer.querySelectorAll('button');
            buttons.forEach(btn => btn.disabled = true);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex >= questions.length) {
                showSummary();
            } else {
                displayQuestion();
            }
        }

        function showSummary() {
            document.getElementById('quizSection').classList.add('hidden');
            document.getElementById('summarySection').classList.remove('hidden');
            document.getElementById('finalScore').textContent = score;
        }
    </script>
</body>
</html>
