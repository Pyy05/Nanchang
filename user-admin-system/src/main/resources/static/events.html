<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

            color: white;
            border-color: #C53030;
        }
        .event-item {
            transition: transform 0.3s ease;
        }
        .event-item:hover {

        }

<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">

                <span class="iconify text-3xl red-accent" data-icon="ri:ancient-pavilion-fill"></span>
                <span class="text-xl font-bold tracking-wider text-gray-800">南昌历史云志</span>
            </div>
            <div class="hidden md:flex space-x-8 text-gray-600 font-medium">
                <a class="hover:text-red-600" href="index.html">首页</a>
                <a class="red-accent border-b-2 border-red-600" href="events.html">历史事件</a>
                <a class="hover:text-red-600" href="special-81.html">八一专题</a>
                <a class="hover:text-red-600" href="figures.html">历史人物</a>
                <a class="hover:text-red-600" href="timeline.html">历史长河</a>
                <a class="hover:text-red-600" href="faq.html">互动问答</a>
                <a class="hover:text-red-600" href="about.html">关于我们</a>
            </div>
            <div class="flex items-center space-x-4">
                <a class="p-2 text-gray-500 hover:bg-gray-100 rounded-full" href="search.html"><span class="iconify text-xl" data-icon="ri:search-line"></span></a>
                <a class="bg-red-accent text-white px-4 py-2 rounded-md text-sm hover:bg-red-700 transition" href="admin-login.html">后台管理</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center red-accent mb-8">历史事件库</h1>

        <div class="flex flex-wrap gap-3 justify-center mb-8">
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition active">全部时期</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">西汉</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">西晋</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">唐朝</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">五代十国（南唐）</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">元末</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">明朝</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">清朝</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">中华民国</button>
            <button class="filter-btn px-4 py-2 border rounded-full text-sm hover:bg-gray-100 transition">中华人民共和国</button>
        </div>

        <div id="eventList" class="space-y-6"></div>

        
    </div>

    <footer class="bg-gray-900 text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p>© 2026 南昌历史云志 · 历史事件归档计划</p>
        </div>
    </footer>

    <script>
        $(document).ready(function () {
            // 事件名→图片链接（已添加你提供的所有图片）
            const imageMap = {
                "灌婴筑城": "https://www.helloimg.com/i/2026/05/31/6a1c1b80ce8eb.jpg",
                "许逊治水": "https://www.helloimg.com/i/2026/05/31/6a1c1b8bed169.jpg",
                "滕王阁始建": "https://www.helloimg.com/i/2026/05/31/6a1c1b8833c71.jpg",
                "南唐迁都南昌": "https://www.helloimg.com/i/2026/05/31/6a1c36b6f3378.png",
                "洪都之战": "https://www.helloimg.com/i/2026/05/31/6a1c1b80e6390.jpg",
                "王守仁平叛": "https://www.helloimg.com/i/2026/05/31/6a1c1b88bf6c4.jpg",
                "刘显抗倭": "https://www.helloimg.com/i/2026/05/31/6a1c1b80e483a.jpg",
                "八大山人出家": "https://www.helloimg.com/i/2026/05/31/6a1c1b8089982.jpg",
                "程矞采禁烟": "https://www.helloimg.com/i/2026/05/31/6a1c36d805403.png",
                "孙中山南昌阅兵": "https://www.helloimg.com/i/2026/05/31/6a1c368e9b95b.png",
                "袁玉冰创办《新江西》": "https://www.helloimg.com/i/2026/05/31/6a1c1b890abbf.jpg",
                "扬子洲农民协会成立": "https://www.helloimg.com/i/2026/05/31/6a1c1b8d9901b.jpg",
                "八一南昌起义": "https://www.helloimg.com/i/2026/05/31/6a1c1b80defc8.jpg",
                "新四军军部进驻南昌": "https://www.helloimg.com/i/2026/05/31/6a1c1b89e7c39.jpg",
                "南昌会战": "https://www.helloimg.com/i/2026/05/31/6a1c1b81314c0.jpg",
                "新中国第一架飞机首飞成功": "https://www.helloimg.com/i/2026/05/31/6a1c1b8a31763.jpg",
                "南昌市被列为国家历史文化名城": "https://www.helloimg.com/i/2026/05/31/6a1c1b8604d65.jpg",
                "滕王阁景区获评国家5A级景区": "https://www.helloimg.com/i/2026/05/31/6a1c1b87be9fb.jpg"
            };

            // 筛选点击事件
            $('.filter-btn').click(function () {
                $('.filter-btn').removeClass('active');
                $(this).addClass('active');
                loadEvent($(this).text());
            });

            // 加载事件列表
            function loadEvent(dynasty = "全部时期") {
                $('#eventList').html('<div class="empty-state">加载中...</div>');
                $.ajax({
                    url: "/api/event/list",
                    type: "GET",
                    data: { dynasty: dynasty },
                    success: function (list) {
                        console.log("返回数据：", list);
                        let html = "";
                        list.forEach(e => {
                            // 匹配图片链接
                            const imgUrl = imageMap[e.eventName] || "https://via.placeholder.com/200x120?text=暂无图片";
                            const content = e.process ? e.process.substring(0, 100) + '...' : '暂无简介';
                            html += `
                                <div class="event-item bg-white rounded-xl shadow-md p-6 flex gap-6">
                                    <img src="${imgUrl}" alt="${e.eventName}" class="w-48 h-32 object-cover rounded-lg flex-shrink-0">
                                    <div class="flex-1">
                                        <h3 class="text-xl font-bold text-gray-800 mb-2">${e.eventName || '无标题'}</h3>
                                        <div class="flex gap-4 text-sm text-gray-600 mb-3">
                                            <span>时间：${e.occurTime || '未知时间'}</span>
                                            <span>朝代：${e.dynasty || '未知朝代'}</span>
                                        </div>
                                        <p class="text-gray-700 mb-4">${content}</p>
                                        <a href="event-detail.html?id=${e.eventId}" class="inline-block bg-red-accent text-white px-6 py-2 rounded hover:bg-red-700 transition">查看详情</a>
                                    </div>
                                </div>
                            `;
                        });
                        $('#eventList').html(html || '<div class="empty-state">暂无事件</div>');
                    },
                    error: function () {
                        $('#eventList').html('<div class="text-center py-12 text-red-500">加载失败</div>');
                    }
                });
            }

            // 默认加载全部事件
            loadEvent();
        });
    </script>
</body>
</html>
