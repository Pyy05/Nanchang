<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>历史长河 - 可视化时间轴</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<style>
    .timeline-line::before {
        content: '';
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 2px;
        background: #E2E8F0;
        transform: translateX(-50%);
    }
    @media (max-width: 768px) {
        .timeline-line::before { left: 20px; }
    }
</style>
</head>
<body class="bg-slate-100 font-sans">

<div class="bg-white px-8 py-4 flex justify-between items-center border-b sticky top-0 z-50">
    <a class="flex items-center space-x-2 text-red-600 font-bold" href="index.html">
        <span class="iconify" data-icon="ri:history-line"></span>
        <span>南昌历史云志 · 时间轴</span>
    </a>
    <div class="text-xs text-gray-500 hidden md:block italic">
        拖动浏览南昌两千余载峥嵘岁月
    </div>
    <a class="text-sm border px-3 py-1 rounded hover:bg-gray-50" href="index.html">返回</a>
</div>

<main class="py-20 max-w-5xl mx-auto px-4 relative timeline-line">
    <div id="timelineContainer"></div>

    <div class="text-center py-20 text-gray-400">
        <span class="inline-block px-4 py-1 border rounded-full text-xs">未完待续 · 继往开来</span>
    </div>
</main>

<div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-md px-6 py-3 rounded-full shadow-lg border text-sm flex space-x-8">
    <button class="hover:text-red-600 font-bold">查看更早</button>
    <span class="text-gray-300">|</span>
    <button class="hover:text-red-600 font-bold">下载时间轴PDF</button>
</div>

<script>
$(document).ready(function () {
    $.ajax({
        url: "/api/timeline",
        type: "GET",
        success: function (list) {
            let html = "";

            list.forEach((item, index) => {
                const timePoint = item.timePoint || "";
                const eventName = item.eventName || "";
                const description = item.description || "";
                const eventId = item.eventId || "";

                const isRightCard = index % 2 === 0;
                // 给不同事件类型分配不同图标
                const iconList = ['ri:building-4-line', 'ri:water-flash-line', 'ri:palace-line', 'ri:flag-2-line', 'ri:book-open-line'];
                const icon = iconList[index % iconList.length];

                if (isRightCard) {
                    html += `
<div class="mb-24 relative flex flex-col md:flex-row items-center justify-between">
    <div class="hidden md:block w-5/12 text-right pr-12">
        <div class="bg-white p-6 rounded-xl shadow-lg border-r-4 border-red-500 hover:shadow-xl transition-shadow">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-red-500 bg-red-50 px-2 py-1 rounded">历史事件</span>
                <span class="iconify text-red-500 text-2xl" data-icon="${icon}"></span>
            </div>
            <h4 class="text-xl font-bold text-gray-800 mb-3">${eventName}</h4>
            <p class="text-gray-600 text-sm leading-relaxed mb-4">${description}</p>
            <div class="flex justify-end">
                <a href="event-detail.html?id=${eventId}" class="text-red-600 hover:text-red-700 font-medium flex items-center gap-1">
                    查看详情
                    <span class="iconify" data-icon="ri:arrow-right-line"></span>
                </a>
            </div>
        </div>
    </div>
    <div class="z-10 bg-red-600 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold border-4 border-white shadow-md">
        ${timePoint.substring(0,1)}
    </div>
    <div class="w-full md:w-5/12 mt-4 md:mt-0 md:pl-12">
        <span class="text-2xl font-black text-slate-300">${timePoint}</span>
    </div>
</div>
                    `;
                } else {
                    html += `
<div class="mb-24 relative flex flex-col md:flex-row items-center justify-between">
    <div class="w-full md:w-5/12 text-left mb-4 md:mb-0 md:pr-12 md:order-2">
        <div class="bg-white p-6 rounded-xl shadow-lg border-l-4 border-blue-500 hover:shadow-xl transition-shadow">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-blue-500 bg-blue-50 px-2 py-1 rounded">历史事件</span>
                <span class="iconify text-blue-500 text-2xl" data-icon="${icon}"></span>
            </div>
            <h4 class="text-xl font-bold text-gray-800 mb-3">${eventName}</h4>
            <p class="text-gray-600 text-sm leading-relaxed mb-4">${description}</p>
            <div class="flex justify-start">
                <a href="event-detail.html?id=${eventId}" class="text-blue-600 hover:text-blue-700 font-medium flex items-center gap-1">
                    查看详情
                    <span class="iconify" data-icon="ri:arrow-right-line"></span>
                </a>
            </div>
        </div>
    </div>
    <div class="z-10 bg-blue-500 text-white w-10 h-10 rounded-full flex items-center justify-center font-bold border-4 border-white shadow-md order-1">
        ${timePoint.substring(0,1)}
    </div>
    <div class="w-full md:w-5/12 md:pl-12 md:order-1 md:text-right">
        <span class="text-2xl font-black text-slate-300">${timePoint}</span>
    </div>
</div>
                    `;
                }
            });

            $("#timelineContainer").html(html);
        }
    });
});
</script>
</body>
</html>
