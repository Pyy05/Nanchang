<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>历史人物详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        .red-accent { color: #C53030; }
        .bg-red-accent { background-color: #C53030; }
    </style>
</head>
<body class="bg-[#FAF9F6] font-sans">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16">
            <a href="figures.html" class="flex items-center space-x-2 text-gray-600 hover:text-red-600 transition font-bold">
                <span class="iconify text-xl" data-icon="ri:arrow-left-line"></span>
                <span>返回人物列表</span>
            </a>
            <div class="text-xl font-bold tracking-wider text-gray-800">
                英雄人物档案
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12" id="detailContainer">
        <div class="text-center py-12">加载中...</div>
    </main>

    <script>
        $(document).ready(function () {
            const urlParams = new URLSearchParams(window.location.search);
            const personId = urlParams.get('id');

            if (!personId) {
                $('#detailContainer').html('<div class="text-center py-12 text-red-500">无效的人物ID</div>');
                return;
            }

            $.ajax({
                url: "/api/person/" + personId,
                type: "GET",
                success: function (p) {
                    const imgUrl = p.cover || "https://via.placeholder.com/400x400?text=暂无图片";
                    $('title').text(p.name + ' - 历史人物详情');
                    
                    const html = `
                    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                        <div class="h-48 bg-red-900 relative">
                            <div class="absolute inset-0 opacity-20 bg-cover bg-center" style="background-image: url('${imgUrl}')"></div>
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                        </div>
                        
                        <div class="px-8 pb-8 relative">
                            <div class="flex flex-col md:flex-row items-end -mt-20 mb-8 space-y-4 md:space-y-0 md:space-x-8">
                                <img src="${imgUrl}" alt="${p.name}" class="w-40 h-40 object-cover rounded-xl border-4 border-white shadow-xl relative z-10" />
                                <div class="flex-1">
                                    <h1 class="text-4xl font-black text-gray-800">${p.name}</h1>
                                    <p class="text-red-700 font-bold mt-2 text-lg">${p.relatedEvent || p.dynasty}</p>
                                </div>
                                <div class="flex space-x-3 mt-4">
                                    <button onclick="handleFavorite()" class="px-6 py-2 bg-red-700 text-white rounded-md font-bold shadow hover:bg-red-800 transition flex items-center">
                                        <span class="iconify mr-2" data-icon="ri:star-fill"></span> 收藏档案
                                    </button>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div class="col-span-2 space-y-8">
                                    <section>
                                        <h2 class="text-2xl font-bold border-b-2 border-red-700 pb-2 mb-4 inline-block">生平简介</h2>
                                        <p class="text-gray-700 leading-relaxed text-justify indent-8 whitespace-pre-line">${p.biography || '暂无介绍'}</p>
                                    </section>
                                    ${p.contribution ? `
                                    <section>
                                        <h2 class="text-2xl font-bold border-b-2 border-red-700 pb-2 mb-4 inline-block">主要贡献 / 事迹</h2>
                                        <p class="text-gray-700 leading-relaxed text-justify indent-8 whitespace-pre-line">${p.contribution}</p>
                                    </section>` : ''}
                                </div>
                                <div class="col-span-1 space-y-6">
                                    <div class="bg-gray-50 p-6 rounded-lg border border-gray-100">
                                        <h3 class="font-bold text-gray-800 mb-4 flex items-center">
                                            <span class="iconify text-red-600 mr-2" data-icon="ri:information-line"></span> 核心信息
                                        </h3>
                                        <ul class="space-y-3 text-sm text-gray-600">
                                            <li class="flex justify-between border-b pb-2">
                                                <span class="text-gray-400">朝代</span>
                                                <span class="font-medium text-right">${p.dynasty || '未知'}</span>
                                            </li>
                                            <li class="flex justify-between border-b pb-2">
                                                <span class="text-gray-400">生卒年</span>
                                                <span class="font-medium text-right">${p.birthDeath || '未知'}</span>
                                            </li>
                                            <li class="flex justify-between border-b pb-2">
                                                <span class="text-gray-400">资料来源</span>
                                                <span class="font-medium text-right">${p.source || '未知'}</span>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    `;
                    $('#detailContainer').html(html);
                },
                error: function () {
                    $('#detailContainer').html(`
                        <div class="text-center py-12">
                            <p class="text-red-500 mb-4">详情加载失败</p>
                            <a href="figures.html" class="inline-block bg-gray-200 px-6 py-2 rounded hover:bg-gray-300 transition">返回列表</a>
                        </div>
                    `);
                }
            });
        });

        function handleFavorite() {
            // 简单判断是否登录（例如通过localStorage或者sessionStorage检查）
            // 如果项目中没有明确的token标志，按照要求直接跳转或提示
            let isLoggedIn = localStorage.getItem('userToken') || sessionStorage.getItem('user');
            if (!isLoggedIn) {
                alert('请先登录后收藏！');
                window.location.href = 'admin-login.html';
            } else {
                alert('收藏成功！');
            }
        }
    </script>
</body>
</html>
