<style>
/* 柱状图样式 */
.bar-chart-container {
    position: relative;
    height: 200px;
    width: 100%;
}

.bar-chart {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    top: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 0 5%;
}

.chart-grid {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
}

.grid-line {
    height: 1px;
    background-color: #e5e7eb;
}

.chart-bar {
    width: 12%;
    background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
    border-radius: 4px 4px 0 0;
    transition: height 0.3s ease, background 0.3s ease;
    position: relative;
    min-height: 4px;
}

.chart-bar:hover {
    background: linear-gradient(180deg, #f87171 0%, #ef4444 100%);
}

.chart-labels {
    position: absolute;
    bottom: -25px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    padding: 0 5%;
}

.chart-label {
    font-size: 12px;
    color: #6b7280;
    text-align: center;
    width: 12%;
}

.chart-values {
    position: absolute;
    top: -25px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    padding: 0 5%;
}

.chart-value {
    font-size: 12px;
    color: #ef4444;
    font-weight: bold;
    text-align: center;
    width: 12%;
}
</style>
</head>

<!-- 近7天答题数量 - 柱状图 -->
<div class="bg-white rounded-xl shadow-sm border p-6">
<h3 class="font-bold mb-4 flex items-center space-x-2">
<span class="iconify" data-icon="ri:bar-chart-2-line"></span>
<span>近7天答题趋势</span>
</h3>
<div id="barChartContainer">
<div class="bar-chart-container">
<div class="chart-grid">
<div class="grid-line"></div>
<div class="grid-line"></div>
<div class="grid-line"></div>
<div class="grid-line"></div>
<div class="grid-line"></div>
</div>
<div class="bar-chart" id="chartBars"></div>
<div class="chart-labels" id="chartLabels"></div>
<div class="chart-values" id="chartValues"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('页面加载完成');
    initPage();
});

async function initPage() {
    await loadOverview();
    await loadBarChart();
    await loadTypeChart();
}

async function loadOverview() {
    try {
        const response = await fetch('/quiz/statistics/overview');
        const result = await response.json();
        console.log('概览数据:', result);
        
        if (result.code === 1 && result.data) {
            document.getElementById('totalQuizCount').textContent = result.data.totalQuizCount || 0;
            document.getElementById('totalUserCount').textContent = result.data.totalUserCount || 0;
            document.getElementById('todayQuizCount').textContent = result.data.todayQuizCount || 0;
            document.getElementById('accuracy').textContent = result.data.accuracy || '-';
        }
    } catch (error) {
        console.error('加载概览失败:', error);
    }
}

// 加载柱状图数据
async function loadBarChart() {
    try {
        console.log('正在获取每日数据...');
        const response = await fetch('/quiz/statistics/daily');
        const result = await response.json();
        console.log('每日数据响应:', result);
        
        const container = document.getElementById('barChartContainer');
        const emptyDiv = document.getElementById('barChartEmpty');
        
        // 检查响应是否正常
        if (!response.ok) {
            console.error('HTTP错误:', response.status);
            container.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }
        
        if (!result || result.code !== 1 || !result.data) {
            console.error('数据格式错误:', result);
            container.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }
        
        const labels = result.data.labels;
        const data = result.data.data;
        
        if (!labels || !data || labels.length === 0 || data.length === 0) {
            console.error('数据为空');
            container.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }
        
        // 检查是否有非零数据
        const hasData = data.some(v => v > 0);
        if (!hasData) {
            container.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }
        
        emptyDiv.classList.add('hidden');
        container.classList.remove('hidden');
        
        // 生成柱状图
        generateBarChart(labels, data);
        
    } catch (error) {
        console.error('加载柱状图失败:', error);
        document.getElementById('barChartContainer').classList.add('hidden');
        document.getElementById('barChartEmpty').classList.remove('hidden');
    }
}

// 生成柱状图
function generateBarChart(labels, data) {
    const maxValue = Math.max(...data);
    const minValue = Math.min(...data);
    const range = maxValue - minValue || 1;
    
    // 生成柱状图
    let barsHtml = '';
    for (let i = 0; i < data.length; i++) {
        // 将数据值映射到0-90%的高度范围
        const height = maxValue > 0 ? ((data[i] - minValue) / range * 90) + 5 : 5;
        barsHtml += `<div class="chart-bar" style="height: ${Math.max(height, 4)}%"></div>`;
    }
    document.getElementById('chartBars').innerHTML = barsHtml;
    
    // 更新标签
    let labelsHtml = '';
    let valuesHtml = '';
    for (let i = 0; i < labels.length; i++) {
        labelsHtml += `<span class="chart-label">${labels[i]}</span>`;
        valuesHtml += `<span class="chart-value">${data[i]}</span>`;
    }
    document.getElementById('chartLabels').innerHTML = labelsHtml;
    document.getElementById('chartValues').innerHTML = valuesHtml;
}

// 加载答题类型分布
async function loadTypeChart() {
    try {
        const response = await fetch('/quiz/statistics/type');
        const result = await response.json();
        console.log('类型数据:', result);
        
        const container = document.getElementById('typeChartContainer');
        const emptyDiv = document.getElementById('typeChartEmpty');
        
        if (!response.ok || !result || result.code !== 1 || !result.data) {
            container.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }
        
        const labels = result.data.labels;
        const data = result.data.data;
        
        if (!labels || !data || data.length === 0) {
            container.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }
        
        const hasData = data.some(v => v > 0);
        if (!hasData) {
            container.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }
        
        emptyDiv.classList.add('hidden');
        container.classList.remove('hidden');
        
        let eventCount = 0;
        let personCount = 0;
        
        for (let i = 0; i < labels.length; i++) {
            if (labels[i] === '事件题') {
                eventCount = data[i];
            } else if (labels[i] === '人物题') {
                personCount = data[i];
            }
        }
        
        const total = eventCount + personCount;
        const eventPercentage = total > 0 ? Math.round((eventCount / total) * 100) : 0;
        
        document.getElementById('eventCount').textContent = eventCount;
        document.getElementById('personCount').textContent = personCount;
        document.getElementById('typePercentage').textContent = eventPercentage + '%';
        
        const pieElement = document.getElementById('typePie');
        if (eventPercentage > 0) {
            pieElement.style.background = `conic-gradient(
                #ef4444 0% ${eventPercentage}%, 
                #3b82f6 ${eventPercentage}% 100%
            )`;
        }
        
    } catch (error) {
        console.error('加载类型数据失败:', error);
        document.getElementById('typeChartContainer').classList.add('hidden');
        document.getElementById('typeChartEmpty').classList.remove('hidden');
    }
}
</script>
</body>
