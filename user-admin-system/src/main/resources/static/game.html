<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色记忆游戏大厅 | 英雄城红色记忆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 通用卡牌翻转动画 */
        .card { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; }
        .card-back { transform: rotateY(180deg); }
        .match-success { animation: flash 0.8s ease; }
        @keyframes flash {
            0%, 100% { background-color: #fef2f2; }
            50% { background-color: #fca5a5; }
        }
        .game-tab { display: none; }
        .game-tab.active { display: block; }
    </style>
</head>
<body class="bg-gradient-to-br from-red-50 to-orange-50 min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <!-- 顶部标题 -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-red-700 mb-2">🏠 红色记忆游戏大厅</h1>
            <p class="text-gray-600">选择你喜欢的小游戏，边玩边学红色历史！</p>
        </div>

        <!-- 游戏切换标签 -->
        <div class="flex justify-center gap-4 mb-6 flex-wrap">
            <button onclick="switchGame('pair')" class="game-btn px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">
                历史配对
            </button>
            <button onclick="switchGame('quiz')" class="game-btn px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition">
                知识问答
            </button>
            <button onclick="switchGame('memory')" class="game-btn px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition">
                记忆翻牌
            </button>
        </div>

        <!-- 游戏1：历史人物&事件配对 -->
        <div id="game-pair" class="game-tab active">
            <div class="text-center mb-4">
                <p class="text-gray-600 mb-2">翻开卡牌，将历史事件与对应人物匹配成功即可消除</p>
                <div class="flex justify-center gap-10 text-lg">
                    <div>得分：<span id="pair-score" class="text-red-600 font-bold text-xl">0</span></div>
                    <div>剩余配对：<span id="pair-remain" class="text-red-600 font-bold text-xl">8</span></div>
                </div>
            </div>
            <div id="pair-gameBox" class="grid grid-cols-4 md:grid-cols-5 gap-4"></div>
            <div id="pair-winModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
                <div class="bg-white rounded-xl p-8 text-center shadow-2xl">
                    <h2 class="text-2xl font-bold text-red-700 mb-4">🎉 恭喜配对成功！</h2>
                    <p class="mb-6">最终得分：<span id="pair-finalScore" class="text-red-600 font-bold text-xl">0</span></p>
                    <button onclick="restartPairGame()" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition">
                        重新开始
                    </button>
                </div>
            </div>
        </div>

        <!-- 游戏2：红色知识问答 -->
        <div id="game-quiz" class="game-tab">
            <div class="text-center mb-4">
                <p class="text-gray-600 mb-2">回答红色历史问题，看看你对英雄城了解多少！</p>
                <div class="flex justify-center gap-10 text-lg">
                    <div>得分：<span id="quiz-score" class="text-red-600 font-bold text-xl">0</span></div>
                    <div>题目：<span id="quiz-index" class="text-red-600 font-bold text-xl">1</span>/5</div>
                </div>
            </div>
            <div id="quiz-box" class="bg-white rounded-xl p-6 shadow-lg max-w-xl mx-auto">
                <h3 id="quiz-question" class="text-lg font-semibold mb-4 text-center"></h3>
                <div id="quiz-options" class="space-y-3"></div>
            </div>
            <div id="quiz-winModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
                <div class="bg-white rounded-xl p-8 text-center shadow-2xl">
                    <h2 class="text-2xl font-bold text-red-700 mb-4">🎉 问答完成！</h2>
                    <p class="mb-6">最终得分：<span id="quiz-finalScore" class="text-red-600 font-bold text-xl">0</span></p>
                    <button onclick="restartQuizGame()" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition">
                        重新开始
                    </button>
                </div>
            </div>
        </div>

        <!-- 游戏3：红色主题记忆翻牌 -->
        <div id="game-memory" class="game-tab">
            <div class="text-center mb-4">
                <p class="text-gray-600 mb-2">找出相同的红色主题词汇，配对消除</p>
                <div class="flex justify-center gap-10 text-lg">
                    <div>得分：<span id="memory-score" class="text-red-600 font-bold text-xl">0</span></div>
                    <div>剩余配对：<span id="memory-remain" class="text-red-600 font-bold text-xl">6</span></div>
                </div>
            </div>
            <div id="memory-gameBox" class="grid grid-cols-4 gap-4 max-w-xl mx-auto"></div>
            <div id="memory-winModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
                <div class="bg-white rounded-xl p-8 text-center shadow-2xl">
                    <h2 class="text-2xl font-bold text-red-700 mb-4">🎉 记忆配对成功！</h2>
                    <p class="mb-6">最终得分：<span id="memory-finalScore" class="text-red-600 font-bold text-xl">0</span></p>
                    <button onclick="restartMemoryGame()" class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition">
                        重新开始
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ------------------- 游戏大厅切换 -------------------
        function switchGame(gameName) {
            document.querySelectorAll('.game-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.game-btn').forEach(btn => {
                btn.classList.remove('bg-red-600', 'text-white');
                btn.classList.add('bg-gray-300', 'text-gray-800');
            });
            document.getElementById(`game-${gameName}`).classList.add('active');
            event.target.classList.remove('bg-gray-300', 'text-gray-800');
            event.target.classList.add('bg-red-600', 'text-white');
        }

        // ------------------- 游戏1：历史配对 -------------------
        const pairList = [
            { event: "南昌起义", person: "周恩来" },
            { event: "南昌起义", person: "贺龙" },
            { event: "井冈山会师", person: "毛泽东" },
            { event: "井冈山会师", person: "朱德" },
            { event: "秋收起义", person: "毛泽东" },
            { event: "长征", person: "红军战士" },
            { event: "遵义会议", person: "毛泽东" },
            { event: "八一精神", person: "革命先烈" }
        ];
        let pairCards = [];
        pairList.forEach(item => {
            pairCards.push({ type: "event", content: item.event, target: item.person });
            pairCards.push({ type: "person", content: item.person, target: item.event });
        });
        let pairFirst = null, pairLock = false, pairScore = 0, pairRemain = pairList.length;
        const pairGameBox = document.getElementById("pair-gameBox");
        const pairScoreDom = document.getElementById("pair-score");
        const pairRemainDom = document.getElementById("pair-remain");
        const pairWinModal = document.getElementById("pair-winModal");
        const pairFinalScoreDom = document.getElementById("pair-finalScore");

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function initPairGame() {
            pairGameBox.innerHTML = "";
            pairFirst = null; pairLock = false; pairScore = 0; pairRemain = pairList.length;
            pairScoreDom.innerText = pairScore; pairRemainDom.innerText = pairRemain;
            pairWinModal.classList.add("hidden");
            let shuffled = shuffle([...pairCards]);
            shuffled.forEach((item) => {
                const card = document.createElement("div");
                card.className = "card cursor-pointer";
                card.dataset.target = item.target;
                card.dataset.content = item.content;
                card.innerHTML = `
                    <div class="card-inner relative h-24 md:h-28">
                        <div class="card-front absolute inset-0 bg-red-600 rounded-xl flex items-center justify-center text-white text-xl font-bold shadow-lg hover:bg-red-700 transition">❓</div>
                        <div class="card-back absolute inset-0 bg-white rounded-xl flex items-center justify-center border-2 border-red-400 shadow-md p-2"><span class="text-gray-800 font-medium text-sm md:text-base">${item.content}</span></div>
                    </div>
                `;
                card.addEventListener("click", () => {
                    if (pairLock || card.classList.contains("flipped")) return;
                    card.classList.add("flipped");
                    if (!pairFirst) {
                        pairFirst = card;
                    } else {
                        pairLock = true;
                        if (pairFirst.dataset.target === card.dataset.content && card.dataset.target === pairFirst.dataset.content) {
                            pairScore += 20; pairRemain--;
                            pairScoreDom.innerText = pairScore; pairRemainDom.innerText = pairRemain;
                            pairFirst.classList.add("match-success"); card.classList.add("match-success");
                            pairLock = false; pairFirst = null;
                            if (pairRemain <= 0) {
                                setTimeout(() => { pairFinalScoreDom.innerText = pairScore; pairWinModal.classList.remove("hidden"); }, 600);
                            }
                        } else {
                            setTimeout(() => {
                                pairFirst.classList.remove("flipped"); card.classList.remove("flipped");
                                pairLock = false; pairFirst = null;
                            }, 1000);
                        }
                    }
                });
                pairGameBox.appendChild(card);
            });
        }
        function restartPairGame() { initPairGame(); }

        // ------------------- 游戏2：知识问答 -------------------
        const quizList = [
            { q: "南昌起义发生在哪一年？", options: ["1926", "1927", "1928", "1929"], answer: 1 },
            { q: "井冈山会师的两支主要部队是？", options: ["红军和八路军", "毛泽东和朱德的部队", "红军和新四军", "八路军和新四军"], answer: 1 },
            { q: "长征的出发地是？", options: ["瑞金", "遵义", "延安", "井冈山"], answer: 0 },
            { q: "遵义会议确立了谁的领导地位？", options: ["周恩来", "毛泽东", "朱德", "邓小平"], answer: 1 },
            { q: "八一建军节是为了纪念？", options: ["南昌起义", "秋收起义", "长征", "抗日战争胜利"], answer: 0 }
        ];
        let quizIndex = 0, quizScore = 0;
        const quizQuestion = document.getElementById("quiz-question");
        const quizOptions = document.getElementById("quiz-options");
        const quizScoreDom = document.getElementById("quiz-score");
        const quizIndexDom = document.getElementById("quiz-index");
        const quizWinModal = document.getElementById("quiz-winModal");
        const quizFinalScoreDom = document.getElementById("quiz-finalScore");

        function initQuizGame() {
            quizIndex = 0; quizScore = 0;
            quizScoreDom.innerText = quizScore; quizIndexDom.innerText = quizIndex + 1;
            quizWinModal.classList.add("hidden");
            showQuizQuestion();
        }
        function showQuizQuestion() {
            const q = quizList[quizIndex];
            quizQuestion.innerText = q.q;
            quizOptions.innerHTML = "";
            q.options.forEach((opt, i) => {
                const btn = document.createElement("button");
                btn.className = "w-full py-2 px-4 border border-gray-300 rounded-lg hover:bg-red-50 transition text-left";
                btn.innerText = opt;
                btn.onclick = () => {
                    if (i === q.answer) {
                        quizScore += 20; quizScoreDom.innerText = quizScore;
                    }
                    quizIndex++;
                    if (quizIndex >= quizList.length) {
                        quizFinalScoreDom.innerText = quizScore;
                        quizWinModal.classList.remove("hidden");
                    } else {
                        quizIndexDom.innerText = quizIndex + 1;
                        showQuizQuestion();
                    }
                };
                quizOptions.appendChild(btn);
            });
        }
        function restartQuizGame() { initQuizGame(); }

        // ------------------- 游戏3：记忆翻牌 -------------------
        const memoryWords = ["红军", "长征", "井冈山", "八一", "南昌起义", "革命", "红军", "长征", "井冈山", "八一", "南昌起义", "革命"];
        let memoryFirst = null, memoryLock = false, memoryScore = 0, memoryRemain = 6;
        const memoryGameBox = document.getElementById("memory-gameBox");
        const memoryScoreDom = document.getElementById("memory-score");
        const memoryRemainDom = document.getElementById("memory-remain");
        const memoryWinModal = document.getElementById("memory-winModal");
        const memoryFinalScoreDom = document.getElementById("memory-finalScore");

        function initMemoryGame() {
            memoryGameBox.innerHTML = "";
            memoryFirst = null; memoryLock = false; memoryScore = 0; memoryRemain = 6;
            memoryScoreDom.innerText = memoryScore; memoryRemainDom.innerText = memoryRemain;
            memoryWinModal.classList.add("hidden");
            let shuffled = shuffle([...memoryWords]);
            shuffled.forEach((word) => {
                const card = document.createElement("div");
                card.className = "card cursor-pointer";
                card.dataset.word = word;
                card.innerHTML = `
                    <div class="card-inner relative h-20">
                        <div class="card-front absolute inset-0 bg-red-600 rounded-lg flex items-center justify-center text-white text-xl font-bold shadow-lg hover:bg-red-700 transition">❓</div>
                        <div class="card-back absolute inset-0 bg-white rounded-lg flex items-center justify-center border-2 border-red-400 shadow-md"><span class="text-gray-800 font-medium">${word}</span></div>
                    </div>
                `;
                card.addEventListener("click", () => {
                    if (memoryLock || card.classList.contains("flipped")) return;
                    card.classList.add("flipped");
                    if (!memoryFirst) {
                        memoryFirst = card;
                    } else {
                        memoryLock = true;
                        if (memoryFirst.dataset.word === card.dataset.word) {
                            memoryScore += 15; memoryRemain--;
                            memoryScoreDom.innerText = memoryScore; memoryRemainDom.innerText = memoryRemain;
                            memoryFirst.classList.add("match-success"); card.classList.add("match-success");
                            memoryLock = false; memoryFirst = null;
                            if (memoryRemain <= 0) {
                                setTimeout(() => { memoryFinalScoreDom.innerText = memoryScore; memoryWinModal.classList.remove("hidden"); }, 600);
                            }
                        } else {
                            setTimeout(() => {
                                memoryFirst.classList.remove("flipped"); card.classList.remove("flipped");
                                memoryLock = false; memoryFirst = null;
                            }, 1000);
                        }
                    }
                });
                memoryGameBox.appendChild(card);
            });
        }
        function restartMemoryGame() { initMemoryGame(); }

        // 页面加载初始化所有游戏
        window.onload = function() {
            initPairGame();
            initQuizGame();
            initMemoryGame();
        };
    </script>
</body>
</html>
