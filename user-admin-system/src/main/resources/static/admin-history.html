<html lang="zh-CN">

<body class="bg-blue-100 min-h-screen flex">

<!-- 侧边栏 -->
<aside class="w-64 bg-slate-900 text-white flex flex-col shrink-0">
    <div class="p-6 border-b border-slate-400 flex items-center space-x-2">
        <span class="iconify text-red-600 text-2xl" data-icon="ri:dashboard-3-line"></span>
        <span class="font-bold tracking-wider">管理后台</span>
    </div>
    <nav class="flex-grow p-4 space-y-2 text-sm text-slate-400">
        <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2">核心看板</p>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-dashboard.html">
            <span class="iconify" data-icon="ri:home-gear-line"></span>
            <span>主面板</span>
        </a>
        <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2 mt-6">内容维护</p>
        <a class="flex items-center space-x-3 bg-red-600 text-white p-3 rounded-lg" href="admin-history.html">
            <span class="iconify" data-icon="ri:book-read-line"></span>
            <span>历史事件管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-people.html">
            <span class="iconify" data-icon="ri:user-star-line"></span>
            <span>历史人物管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-users.html">
            <span class="iconify" data-icon="ri:team-line"></span>
            <span>系统用户管理</span>
        </a>
        <p class="text-[10px] uppercase font-bold text-slate-500 px-2 py-2 mt-6">互动与设置</p>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-messages.html">
        <span class="iconify" data-icon="ri:message-3-line"></span>
        <span>留言管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-questions.html">
        <span class="iconify" data-icon="ri:settings-4-line"></span>
        <span>题库管理</span>
        </a>
        <a class="flex items-center space-x-3 hover:bg-slate-800 p-3 rounded-lg transition" href="admin-quiz-statistics.html">
            <span class="iconify" data-icon="ri:bar-chart-line"></span>
            <span>答题统计</span>
            </a>
    </nav>
    <div class="p-6 border-t border-slate-800">
        <a class="text-xs flex items-center space-x-2 text-slate-500 hover:text-white" href="index.html">
            <span class="iconify" data-icon="ri:logout-box-line"></span>
            <span>返回前台预览</span>
        </a>
    </div>
</aside>

<!-- 主内容区 -->
<div class="flex-grow flex flex-col h-screen overflow-y-auto">
    <header class="bg-white h-16 border-b px-8 flex justify-between items-center shrink-0">
        <h2 class="font-bold text-gray-700">历史事件管理</h2>
        <a href="admin-history-add.html" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm">+ 新增事件</a>
    </header>

    <main class="p-8">
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="px-6 py-4 border-b">
                <h3 class="font-bold">事件列表</h3>
            </div>
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-400">
                    <tr>
                        <th class="px-6 py-3 font-medium">ID</th>
                        <th class="px-6 py-3 font-medium">事件名称</th>
                        <th class="px-6 py-3 font-medium">时间</th>
                        <th class="px-6 py-3 font-medium">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y text-gray-600">
                    <!-- 数据行将通过JS动态插入 -->
                </tbody>
            </table>
        </div>
    </main>
</div>

<script>
    // 加载事件列表
    async function loadList() {
        try {
            const response = await fetch('/api/event/list');
            const arr = await response.json();

            let html = "";
            arr.forEach(item => {
                html += `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">${item.eventId}</td>
                    <td class="px-6 py-4 font-bold text-gray-900">${item.eventName || ''}</td>
                    <td class="px-6 py-4">${item.occurTime || ''}</td>
                    <td class="px-6 py-4 space-x-2">
                        <button onclick="editEvent(${item.eventId})" class="text-blue-600 hover:text-blue-800 text-sm font-medium">编辑</button>
                        <button onclick="delEvent(${item.eventId})" class="text-red-600 hover:text-red-800 text-sm font-medium">删除</button>
                    </td>
                </tr>`;
            });
            document.getElementById("tableBody").innerHTML = html;
        } catch (error) {
            console.error('加载列表失败:', error);
        }
    }

    function editEvent(id) {
        location.href = 'admin-history-edit.html?id=' + id;
    }

    async function delEvent(id) {
        if (!confirm("确定删除该事件？")) return;
        try {
            let editorName = "系统管理员";
            try {
                const currentUser = JSON.parse(localStorage.getItem('currentUser'));
                if (currentUser && currentUser.username) {
                    editorName = currentUser.username;
                }
            } catch(e) {}
            
            const response = await fetch('/api/event/delete/' + id, { 
                method: 'DELETE',
                headers: { 'X-Editor-Name': editorName }
            });
            const result = await response.json();
            if (result.code === 1) {
                alert("删除成功");
                loadList();
            } else {
                alert("删除失败：" + (result.msg || "未知错误"));
            }
        } catch (error) {
            console.error('删除失败:', error);
            alert("删除失败，请检查网络！");
        }
    }

    window.onload = loadList;
</script>

</body>
</html>
