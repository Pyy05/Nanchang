<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分排行榜 - 南昌历史云志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.1/iconify.min.js"></script>
    <style>
        .rank-1 { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0 0%, #A0A0A0 100%); }
        .rank-3 { background: linear-gradient(135deg, #CD7F32 0%, #B87333 100%); }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 flex justify-between items-center h-16 relative">
            <div class="flex items-center space-x-2">
                <span class="iconify text-3xl red-accent" data-icon="ri:ancient-pavilion-fill"></span>
                <span class="text-xl font-bold text-gray-800">南昌历史云志</span>
            </div>
            <div class="hidden md:flex flex-1 justify-center space-x-8 text-gray-600 font-medium">
                <a class="hover:text-red-600" href="/index.html">首页</a>
                <a class="hover:text-red-600" href="/events.html">历史事件</a>
                <a class="hover:text-red-600" href="/special-81.html">八一专题</a>
                <a class="hover:text-red-600" href="/figures.html">历史人物</a>
                <a class="hover:text-red-600" href="/timeline.html">历史长河</a>
                <a class="hover:text-red-600" href="/faq.html">用户留言</a>
                <a class="hover:text-red-600" href="/quiz.html">互动问答</a>
                <a class="hover:text-red-600" href="/profile.html">我的</a>
            </div>
            <div class="flex items-center space-x-4">
                <a class="p-2 text-gray-500 hover:bg-gray-100 rounded-full" href="/search.html"><span class="iconify text-xl" data-icon="ri:search-line"></span></a>
                <a class="bg-red-accent text-white px-4 py-2 rounded-md text-sm hover:bg-red-700" href="/admin-login.html">后台管理</a>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-yellow-600 to-orange-600 text-white py-12 px-4">
        <div class="max-w-3xl mx-auto text-center">
            <h1 class="text-3xl font-bold mb-3">🏆 学习积分排行榜</h1>
            <p class="text-yellow-100 text-sm opacity-90">看看谁是南昌历史知识达人</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="p-6 border-b">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800">TOP 50 学霸榜</h2>
                    <button onclick="loadLeaderboard()" class="text-sm text-red-600 hover:text-red-700 flex items-center">
                        <span class="iconify mr-1" data-icon="ri:refresh-line"></span>
                        刷新
                    </button>
                </div>
            </div>

            <div id="leaderboardList" class="divide-y">
            </div>
        </div>

        <div class="mt-6 text-center">
            <a href="quiz.html" class="inline-block px-8 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition font-medium">
                <span class="iconify inline-block mr-2" data-icon="ri:play-circle-line"></span>
                立即参与答题
            </a>
        </div>
    </main>

    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            loadLeaderboard();
        });

        function checkLoginStatus() {
            const userStr = localStorage.getItem('currentUser');
            if (userStr) {
                try {
                    currentUser = JSON.parse(userStr);
                    document.getElementById('loginLink').classList.add('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('userInfo').textContent = currentUser.username || '用户';
                } catch (e) {
                    console.error('解析用户信息失败', e);
                }
            }
        }

        async function loadLeaderboard() {
            try {
                const response = await fetch('/api/question/leaderboard?limit=50');
                const result = await response.json();
                
                if (result.code === 1) {
                    renderLeaderboard(result.data);
                } else {
                    document.getElementById('leaderboardList').innerHTML = 
                        '<div class="p-8 text-center text-gray-500">加载失败，请刷新重试</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('leaderboardList').innerHTML = 
                    '<div class="p-8 text-center text-gray-500">网络错误，请检查连接</div>';
            }
        }

        function renderLeaderboard(users) {
            const container = document.getElementById('leaderboardList');
            
            if (!users || users.length === 0) {
                container.innerHTML = '<div class="p-8 text-center text-gray-500">暂无排名数据</div>';
                return;
            }

            container.innerHTML = users.map((user, index) => {
                const rank = index + 1;
                let rankClass = '';
                let rankIcon = '';
                
                if (rank === 1) {
                    rankClass = 'rank-1 text-white';
                    rankIcon = '🥇';
                } else if (rank === 2) {
                    rankClass = 'rank-2 text-white';
                    rankIcon = '🥈';
                } else if (rank === 3) {
                    rankClass = 'rank-3 text-white';
                    rankIcon = '🥉';
                }

                const isCurrentUser = currentUser && currentUser.username === user.username;
                const highlightClass = isCurrentUser ? 'bg-red-50 border-l-4 border-red-600' : '';

                return `
                    <div class="p-4 flex items-center justify-between ${highlightClass} hover:bg-gray-50 transition">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 rounded-full ${rankClass} flex items-center justify-center font-bold text-lg shadow-md">
                                ${rank <= 3 ? rankIcon : rank}
                            </div>
                            <div>
                                <div class="font-bold text-gray-800 ${isCurrentUser ? 'text-red-600' : ''}">
                                    ${escapeHtml(user.username)}
                                    ${isCurrentUser ? '<span class="ml-2 text-xs bg-red-600 text-white px-2 py-0.5 rounded">我</span>' : ''}
                                </div>
                                <div class="text-xs text-gray-500 mt-1">学习达人</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black text-red-600">${user.points || 0}</div>
                            <div class="text-xs text-gray-500">积分</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
