<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员注册 - 南昌历史云志</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8">
    <h2 class="text-2xl font-bold text-center text-red-600 mb-6">管理员注册（严格验证）</h2>

    <form id="adminForm" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">管理员账号</label>
            <input type="text" id="username" required class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-red-500" placeholder="6-18位字母/数字">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
            <input type="email" id="email" required class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <!-- 简化密码 -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">密码（6位以上字母+数字）</label>
            <input type="password" id="pwd" required class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
            <input type="password" id="repwd" required class="w-full border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <div>
            <label class="block text-sm font-medium text-red-600 mb-1">🔑 管理员专属密钥</label>
            <input type="password" id="adminKey" required class="w-full border border-red-400 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-red-500" placeholder="输入正确密钥才可注册">
        </div>

        <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 rounded-lg transition">
            注册管理员
        </button>
    </form>
</div>

<script>
const form = document.getElementById('adminForm');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const pwd = document.getElementById('pwd').value;
    const repwd = document.getElementById('repwd').value;
    const adminKey = document.getElementById('adminKey').value;

    // ===================== 简化密码规则 =====================
    // 只需：6位以上 + 包含字母和数字
    if (pwd.length < 6) {
        alert("密码长度不能少于6位！");
        return;
    }
    if (!/[a-zA-Z]/.test(pwd) || !/[0-9]/.test(pwd)) {
        alert("密码必须同时包含 字母 + 数字！");
        return;
    }
    // ======================================================

    if (pwd !== repwd) {
        alert("两次密码不一致");
        return;
    }
    if (adminKey !== "2026") {
        alert("管理员密钥错误！");
        return;
    }

    // 接口地址已修正为你后端真实地址
    const res = await fetch("http://localhost:8080/user/admin/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: username,
            email: email,
            password: pwd,
            role: "admin"
        })
    });

    if (res.ok) {
        alert("✅ 管理员注册成功！已存入数据库用户表");
        location.href = "admin-login.html";
    } else {
        alert("❌ 注册失败：" + res.statusText);
    }
});
</script>
</body>
</html>
